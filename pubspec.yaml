name: pig_counter
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  dio: ^5.9.1
  shared_preferences: ^2.5.4
  flutter_launcher_icons: ^0.14.4
  flutter_lucide: ^1.8.2
  oktoast: ^3.4.0
  image_picker: ^1.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/
    - lib/assets/images/
    - lib/assets/fonts/HarmonyOS_Sans_SC/
    - lib/assets/fonts/logo/
  fonts:
    - family: logo_font
      fonts:
        - asset: lib/assets/fonts/logo/logo_font.ttf
          weight: 400
          style: normal
    - family: HarmonyOS_Sans_SC
      fonts:
        - asset: lib/assets/fonts/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Thin.ttf
          weight: 100
          style: normal
        - asset: lib/assets/fonts/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Light.ttf
          weight: 300
          style: normal
        - asset: lib/assets/fonts/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Regular.ttf
          weight: 400
          style: normal
        - asset: lib/assets/fonts/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Medium.ttf
          weight: 500
          style: normal
        - asset: lib/assets/fonts/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Bold.ttf
          weight: 700
          style: normal
        - asset: lib/assets/fonts/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Black.ttf
          weight: 900
          style: normal

flutter_launcher_icons:
  android: true
  image_path: "lib/assets/icon.png"
